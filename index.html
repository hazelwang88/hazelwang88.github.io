<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hazel Wang Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    header {
      padding: 60px 20px 30px;
      text-align: center;
      background: white;
    }
    h1 {
      margin: 0;
      font-size: 42px;
    }
    p {
      line-height: 1.6;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }
    .project {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .project img {
      width: 100%;
      border-radius: 12px;
      margin-top: 12px;
    }
    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <header>
    <h1>Hazel Wang</h1>
    <p>Animation Student Portfolio</p>
  </header>

  <div class="container">
    <div class="project">
      <h2>About Me</h2>
      <p>
        I am an animation student. This site is a selection of my animation,
        storyboards, character designs, and visual development work.
      </p>
    </div>

    <div class="project">
      <h2>Project 1</h2>
      <p>Short description of your work.</p>
      <img src="https://via.placeholder.com/900x500.png?text=Project+Image" alt="Project image">
    </div>

    <div class="project">
      <h2>Project 2</h2>
      <p>Another short description of your work.</p>
      <img src="https://via.placeholder.com/900x500.png?text=Another+Project" alt="Project image">
    </div>
  </div>
</body>
</html>
